name: Build for macOS M4

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        env:
          # macOS 专用黑魔法：允许动态查找符号，解决编译时找不到 Lua 库的问题
          RUSTFLAGS: "-C link-arg=-undefined -C link-arg=dynamic_lookup"
        run: cargo build --release --features lua54

      - name: Export SO
        run: |
          mkdir -p output
          # 抓取生成的库并更名
          cp target/release/libwordninja_rs_lua.dylib output/wordninja.so

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: wordninja-macos-m4
          path: output/wordninja.so
