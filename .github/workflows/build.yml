name: Build for macOS M4

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g. v1.0.0)'
        required: true
        default: 'latest'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write # 必须赋予写入权限，否则无法创建 Release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        env:
          RUSTFLAGS: "-C link-arg=-undefined -C link-arg=dynamic_lookup"
        run: cargo build --release --features lua54

      - name: Prepare Artifact
        run: |
          mkdir -p output
          cp target/release/libwordninja_rs_lua.dylib output/wordninja.so

      # 关键步骤：同步到 Releases
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: output/wordninja.so
          name: Release ${{ github.event.inputs.tag_name }}
          body: "Automated build for macOS M4 (arm64)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
