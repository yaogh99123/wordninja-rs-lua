name: Build for macOS M4

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        # 直接在命令行开启 vendored，不依赖 Cargo.toml 里的 features 映射
        run: cargo build --release --features "mlua/lua54 mlua/vendored"

      - name: Export SO
        run: |
          mkdir -p output
          # 找编译出来的库，不管它叫什么名字
          find target/release -maxdepth 1 -name "lib*.dylib" -exec cp {} output/wordninja.so \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: wordninja-macos-m4
          path: output/wordninja.so
